<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>OnlyT Clock</title>
		{SHARED_JS}
		<style>
			html {
				font-family: sans-serif;
				background: #000000;
				margin: 0;
				height: 100%;
			}

			body {
				display: flex;
				flex-direction: column;
				height: 100%;
				margin: 0;
			}

			#main {
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			#clocktext {
				font-size: 24pt;
				font-kerning: none;
				transition: color 0.3s ease;
			}

			.clockstyle {
				font-weight: bold;
				color: #FFFFFF;
			}

			.clockstyle_yellow {
				font-weight: bold;
				color: #FFFF66;
			}

			.clockstyle_green {
				font-weight: bold;
				color: #00FF00;
			}

			.clockstyle_red {
				font-weight: bold;
				color: #FF0000;
			}

			.clockstyle_dim {
				color: #668080;
			}

			a,
			a:visited {
				color: white;
				font-weight: bold;
			}

			a:hover {
				color: silver;
			}

			.link_container {
				text-align: right;
				padding: 5px;
			}

			.link_container a {
				margin-right: 5px;
				padding: 5px;
				background-color: gray;
				text-decoration: none;
			}
		</style>
	</head>

	<body>
		<div id="main">
			<span id="clocktext" onclick="location.reload(); return false" class="clockstyle"></span>
		</div>
		<div class="link_container"><a href="./timers">{WEB_LINK_TIMERS}</a></div>

		<script>
			"use strict";

			const textElem = document.getElementById("clocktext");

			let currentMode = "Nameplate";
			let currentDisplayMode = "Nameplate";
			let currentTargetSecs = 0;
			let closingSecs = 30;
			let currentlyCountingUp = false;
			let timerStartDateTime = new Date();
			let serverTimeOfDayAdjustment = 0;
			const POLLING_INTERVAL_SECS = 4;
			const FADE_DURATION_MS = 400;
			let use24HrClockFormat = false;
			let transitioning = false;

			async function getOnlyTData() {
				const clientDate = new Date();
				try {
					const resp = await fetch('../data/', { cache: 'no-store', signal: AbortSignal.timeout(2000) });
					if (resp.ok) {
						const responseDate = new Date();
						const data = await resp.json();

						currentMode = data.mode;

						switch (data.mode) {
							case 'Timer': {
								const requestLatencyMillisecs = responseDate.getTime() - clientDate.getTime();
								const timerElapsedMillisecs = getClientTimerElapsedMilliSecs();

								currentTargetSecs = data.targetSecs;
								closingSecs = data.closingSecs;
								currentlyCountingUp = data.countUp;

								const serverTimerElapsedMillisecs = (data.mins * 60000) + (data.secs * 1000) + data.ms;
								const diffMillisecs = serverTimerElapsedMillisecs - timerElapsedMillisecs + (requestLatencyMillisecs / 2);

								if (Math.abs(diffMillisecs) > 100) {
									timerStartDateTime.setTime(timerStartDateTime.getTime() - diffMillisecs);
								}
								break;
							}

							case 'TimeOfDay': {
								use24HrClockFormat = data.use24Hr;
								const serverStamp = new Date(clientDate.getTime());
								serverStamp.setHours(data.mins / 60, data.mins % 60, data.secs);
								serverTimeOfDayAdjustment = serverStamp - clientDate;
								break;
							}
						}
					} else {
						currentMode = 'Offline';
					}
				} catch {
					currentMode = 'Offline';
				}

				setTimeout(getOnlyTData, POLLING_INTERVAL_SECS * 1000);
			}

			function getClientTimerElapsedMilliSecs() {
				return new Date().getTime() - timerStartDateTime.getTime();
			}

			function formatTimeOfDay(hrs, mins) {
				if (use24HrClockFormat) {
					return formatMajorMinor(hrs, mins);
				} else {
					return formatMajorMinor(hrs === 0 ? 12 : hrs > 12 ? hrs - 12 : hrs, mins);
				}
			}

			function getDisplayString() {
				switch (currentMode) {
					case 'TimeOfDay': {
						const d = new Date();
						d.setTime(d.getTime() + serverTimeOfDayAdjustment);
						textElem.className = 'clockstyle';
						currentDisplayMode = currentMode;
						return formatTimeOfDay(d.getHours(), d.getMinutes());
					}

					case 'Timer': {
						const clientTimerTotalElapsedSecs = getClientTimerElapsedMilliSecs() / 1000;
						const remainingSecs = currentTargetSecs - clientTimerTotalElapsedSecs;
						setClockColour(remainingSecs, closingSecs, textElem);
						currentDisplayMode = currentMode;
						return currentlyCountingUp
							? getTimeDisplayStringCountingUp(clientTimerTotalElapsedSecs)
							: getTimeDisplayStringCountingDown(clientTimerTotalElapsedSecs, currentTargetSecs);
					}

					case 'Nameplate':
						textElem.className = 'clockstyle_dim';
						currentDisplayMode = currentMode;
						return 'OnlyT';

					default:
						textElem.className = 'clockstyle_dim';
						currentDisplayMode = currentMode;
						return '{WEB_OFFLINE}';
				}
			}

			async function runFadeTransition() {
				try {
					const fadeOut = textElem.animate(
						[{opacity: 1}, {opacity: 0}],
						{duration: FADE_DURATION_MS, easing: 'ease', fill: 'forwards'}
					);
					await fadeOut.finished;

					textElem.textContent = getDisplayString();
					updateTextSize();

					// Two rAFs ensure the browser commits the content change
					// before the fade-in begins, preventing same-frame batching.
					await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

					const fadeIn = textElem.animate(
						[{opacity: 0}, {opacity: 1}],
						{duration: FADE_DURATION_MS, easing: 'ease', fill: 'forwards'}
					);
					await fadeIn.finished;

					// Remove the forwards-fill effects; CSS default (opacity: 1) takes over.
					fadeOut.cancel();
					fadeIn.cancel();
				} finally {
					transitioning = false;
				}
			}

			function updateClock() {
				if (!transitioning) {
					if (currentDisplayMode !== currentMode) {
						transitioning = true;
						runFadeTransition();
					} else {
						textElem.textContent = getDisplayString();
					}
				}
				setTimeout(updateClock, 100); // every 1/10 sec
			}

			function updateTextSize() {
				let curFontSize = 24;
				const targetWidth = 0.9;
				for (let i = 0; i < 3; i++) {
					const newFontSize = textElem.parentNode.offsetWidth * targetWidth / textElem.offsetWidth * curFontSize;
					textElem.style.fontSize = newFontSize.toFixed(3) + 'pt';
					curFontSize = newFontSize;
				}
			}

			getOnlyTData();
			updateClock();
			updateTextSize();

			window.addEventListener("resize", updateTextSize);
		</script>
	</body>
</html>
